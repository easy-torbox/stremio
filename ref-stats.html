<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referral Stats</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 24px;
      color: #222;
      line-height: 1.4;
    }
    h1 {
      margin: 0 0 8px 0;
    }
    .meta {
      margin: 0 0 16px 0;
      color: #555;
    }
    .summary {
      margin: 12px 0 20px 0;
      padding: 12px;
      border: 1px solid #ddd;
      background: #fafafa;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }
    th {
      background: #f3f3f3;
    }
    .active {
      color: #0a7a2f;
      font-weight: bold;
    }
    .inactive {
      color: #a33;
      font-weight: bold;
    }
    .error {
      color: #a33;
      font-weight: bold;
      margin-top: 12px;
    }
    .actions {
      margin-top: 14px;
    }
    .filters {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filters label {
      font-size: 14px;
      color: #444;
    }
    .filters input {
      padding: 6px 8px;
      min-width: 240px;
    }
    .pagination {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pagination button {
      padding: 6px 10px;
    }
    .pagination .page-info {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Referral Stats</h1>
  <p class="meta">Shows current referral codes and total times clicked.</p>

  <div class="summary" id="summary">Loading stats...</div>

  <div class="filters">
    <label for="codeSearchInput">Search code:</label>
    <input id="codeSearchInput" type="search" placeholder="Type referral code..." autocomplete="off" />
  </div>

  <table>
    <thead>
      <tr>
        <th>Code</th>
        <th>Clicks</th>
        <th>Status</th>
        <th>Last Clicked</th>
      </tr>
    </thead>
    <tbody id="statsRows">
      <tr>
        <td colspan="4">Loading...</td>
      </tr>
    </tbody>
  </table>

  <div class="pagination" id="pagination" style="display:none;">
    <button id="prevPageBtn" type="button">Previous</button>
    <button id="nextPageBtn" type="button">Next</button>
    <span class="page-info" id="pageInfo"></span>
  </div>

  <p class="error" id="errorMsg" style="display:none;"></p>

  <div class="actions">
    <button id="refreshBtn" type="button">Refresh</button>
    <a href="referrals.html" style="margin-left:12px;">Back to referrals</a>
  </div>

  <script>
    const API_BASE = 'https://easytorbox-referrals-api.etapps.workers.dev';

    const PAGE_SIZE = 25;
    let allItems = [];
    let filteredItems = [];
    let currentPage = 1;

    function toDateTime(epochSeconds) {
      if (!epochSeconds) return '-';
      const d = new Date(Number(epochSeconds) * 1000);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString();
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&')
        .replaceAll('<', '<')
        .replaceAll('>', '>')
        .replaceAll('"', '"');
    }

    function renderPage() {
      const rowsEl = document.getElementById('statsRows');
      const paginationEl = document.getElementById('pagination');
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const pageInfoEl = document.getElementById('pageInfo');

      if (!allItems.length) {
        rowsEl.innerHTML = '<tr><td colspan="4">No referral records found.</td></tr>';
        paginationEl.style.display = 'none';
        return;
      }

      if (!filteredItems.length) {
        rowsEl.innerHTML = '<tr><td colspan="4">No matching referral codes.</td></tr>';
        paginationEl.style.display = 'none';
        return;
      }

      const totalPages = Math.ceil(filteredItems.length / PAGE_SIZE);
      if (currentPage > totalPages) currentPage = totalPages;
      if (currentPage < 1) currentPage = 1;

      const start = (currentPage - 1) * PAGE_SIZE;
      const pageItems = filteredItems.slice(start, start + PAGE_SIZE);

      rowsEl.innerHTML = pageItems.map((item) => {
        const statusClass = item.isActive ? 'active' : 'inactive';
        const statusLabel = item.isActive ? 'Active' : 'Inactive';
        return `
          <tr>
            <td><code>${escapeHtml(item.code || '')}</code></td>
            <td>${Number(item.clickCount || 0)}</td>
            <td class="${statusClass}">${statusLabel}</td>
            <td>${toDateTime(item.lastClickedAt)}</td>
          </tr>
        `;
      }).join('');

      paginationEl.style.display = totalPages > 1 ? 'flex' : 'none';
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
      pageInfoEl.textContent = `Page ${currentPage} of ${totalPages} | Showing ${start + 1}-${start + pageItems.length} of ${filteredItems.length} matches`;
    }

    function applyFilter() {
      const inputEl = document.getElementById('codeSearchInput');
      const q = (inputEl.value || '').trim().toLowerCase();

      filteredItems = allItems.filter((item) => {
        const code = String(item?.code || '').toLowerCase();
        return !q || code.includes(q);
      });

      currentPage = 1;
      renderPage();
    }

    async function loadStats() {
      const summaryEl = document.getElementById('summary');
      const rowsEl = document.getElementById('statsRows');
      const errorEl = document.getElementById('errorMsg');
      const refreshBtn = document.getElementById('refreshBtn');

      refreshBtn.disabled = true;
      errorEl.style.display = 'none';
      summaryEl.textContent = 'Loading stats...';
      rowsEl.innerHTML = '<tr><td colspan="4">Loading...</td></tr>';
      allItems = [];
      currentPage = 1;
      filteredItems = [];

      try {
        const res = await fetch(`${API_BASE}/referrals/stats`);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.message || 'Failed to load stats.');
        }

        summaryEl.textContent = `Generated: ${toDateTime(data.generatedAt)} | Total Codes: ${data.totalCodes} | Active Codes: ${data.activeCodes} | Total Clicks: ${data.totalClicks}`;

        allItems = Array.isArray(data.items) ? data.items : [];
        applyFilter();
      } catch (err) {
        summaryEl.textContent = 'Could not load stats.';
        rowsEl.innerHTML = '<tr><td colspan="4">Error loading rows.</td></tr>';
        errorEl.textContent = err?.message || 'Unknown error';
        errorEl.style.display = 'block';
      } finally {
        refreshBtn.disabled = false;
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', loadStats);
    document.getElementById('prevPageBtn').addEventListener('click', () => {
      currentPage -= 1;
      renderPage();
    });
    document.getElementById('nextPageBtn').addEventListener('click', () => {
      currentPage += 1;
      renderPage();
    });

    document.getElementById('codeSearchInput').addEventListener('input', applyFilter);

    loadStats();
  </script>
</body>
</html>
